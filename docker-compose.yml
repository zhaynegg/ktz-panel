services:
  # Бэкенд сервис
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env  # Убедитесь, что там лежат ключи Supabase
    volumes:
      - ./backend/data:/app/data
    restart: always

  # Фронтенд сервис
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always